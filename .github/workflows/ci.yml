name: CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  DOTNET_VERSION: '10.0'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install Nx
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Restore .NET
        run: npx nx run docviewer-api:build --skip-nx-cache

      - name: Build .NET
        run: npx nx run docviewer-api:build --configuration Release

      - name: Test .NET
        run: npx nx run-many --targets=test --configuration Release || true

  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/DocViewer.WebApp/package-lock.json

      - name: Install
        run: npm ci
        working-directory: src/DocViewer.WebApp

      - name: Lint
        run: npm run lint || true
        working-directory: src/DocViewer.WebApp

      - name: Build
        run: npm run build
        working-directory: src/DocViewer.WebApp