name: Branch Protection

on:
  workflow_dispatch:

jobs:
  protect:
    runs-on: ubuntu-latest
    steps:
      - name: Protect main branch
        run: |
          # Set branch protection for main
          gh api repos/${{ github.repository }}/branches/main/protection \
            -X PUT \
            -H "Accept: application/vnd.github+json" \
            -f required_status_checks='{"strict":true,"contexts":["ci/check"]}' \
            -f required_pull_request_reviews='{"dismiss_stale_reviews":true,"required_approving_review_count":1}' \
            -f allow_force_pushes=false \
            -f allow_deletions=false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Protect master branch (if exists)
        run: |
          gh api repos/${{ github.repository }}/branches/master/protection \
            -X PUT \
            -H "Accept: application/vnd.github+json" \
            -f required_status_checks='{"strict":true,"contexts":["ci/check"]}' \
            -f required_pull_request_reviews='{"dismiss_stale_reviews":true,"required_approving_review_count":1}' \
            -f allow_force_pushes=false \
            -f allow_deletions=false || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}